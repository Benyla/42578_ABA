# Optional: build and push the Cloud Run image with Cloud Build.
# Replace placeholders, then:
#   gcloud builds submit --config cloudbuild.yaml .
#
substitutions:
  _REGION: europe-west1
  _REPO: aba-rfdetr
  _IMAGE: api

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-f"
      - dockerfiles/Dockerfile.cloudrun
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"
      - "."
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:${SHORT_SHA}"

options:
  logging: CLOUD_LOGGING_ONLY
