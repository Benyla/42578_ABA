# Two-stage cascade inference config.
# Override paths with env STAGE1_MODEL_PATH / STAGE2_MODEL_PATH / ABA_CONFIG_PATH.

stage1:
  model_class: RFDETRMedium
  checkpoint_path: models/stage1_target.pth
  num_classes: 1
  score_threshold: 0.35

stage2:
  model_class: RFDETRMedium
  checkpoint_path: models/stage2_bullet.pth
  num_classes: 12
  score_threshold: 0.35
  crop_padding: 0.05       # 5% padding around Target bbox before running Stage 2

# Optional JSON file: list of all class name strings in combined output order.
# If null, built-in defaults are used.
class_names_file: null
