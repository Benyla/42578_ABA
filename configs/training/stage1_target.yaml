# Stage 1: Target detector — 1 class, 10 epochs.
# Usage: uv run python scripts/train.py --config configs/training/stage1_target.yaml --device cuda

device: cuda

prepare:
  enabled: true
  raw_data_root: data
  roboflow_layout_dir: data/rf_train_stage1
  force: false
  val_fraction: 0.2
  seed: 42
  annotations_file: instances_stage1.json
  images_subdir: images

repeat_train: 2

model:
  class: RFDETRMedium
  num_classes: 1
  resolution: 704
  pretrain_weights: rf-detr-medium.pth

training:
  dataset_file: roboflow
  dataset_dir: data/rf_train_stage1
  output_dir: runs/train
  run: stage1_target
  epochs: 10
  lr: 1.0e-4
  lr_encoder: 1.5e-4
  batch_size: 4
  grad_accum_steps: 4
  num_workers: 4
  multi_scale: false
  expanded_scales: false
  square_resize_div_64: true
  do_random_resize_via_padding: false
  tensorboard: true
  wandb: true
  project: aba-rfdetr
  checkpoint_interval: 1
  eval_interval: 1
  aug_config:
    Sequential:
      transforms:
        - HorizontalFlip:
            p: 0.5
        - RandomResizedCrop:
            size: [704, 704]
            scale: [0.95, 1.0]
            ratio: [1.0, 1.0]
            p: 0.5
        - Rotate:
            limit: 5
            p: 0.5
        - Affine:
            scale: [1.0, 1.0]
            rotate: 0
            shear:
              x: [-2, 2]
              y: [-2, 2]
            p: 0.5
        - HueSaturationValue:
            hue_shift_limit: 0
            sat_shift_limit: [-6, 6]
            val_shift_limit: 0
            p: 0.5
        - RandomBrightnessContrast:
            brightness_limit: [-0.15, 0.15]
            contrast_limit: [-0.05, 0.05]
            p: 0.5
